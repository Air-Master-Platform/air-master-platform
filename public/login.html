<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Vision Airlines — Sign in</title>
  <link rel="stylesheet" href="/login.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>
  <div class="page">
    <div class="card">
      <img class="logo" src="/sky-vision-logo.png" alt="Sky Vision Airlines" />
      <h1>Welcome back</h1>
      <p class="sub">Sign in to the Sky Vision Airlines cargo platform.</p>

      <form id="loginForm" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit" id="submitBtn">Sign in</button>
        <p class="error" id="error" role="alert"></p>
      </form>
    </div>
    <p class="footer">Sky Vision Airlines Cargo &middot; Authorized personnel only</p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed.');
        window.location.href = '/app';
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
