# Fly.io config for the Sky Vision Airlines platform (Node + Python engine).
app = "sky-vision-airlines"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to keep cost near $0; cold start on next request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
